<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Athlete Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root {
    --primary: #0d6efd;
    --secondary: #198754;
    --bg: #f4f6fb;
}

body {
    background: var(--bg);
    font-family: 'Segoe UI', sans-serif;
}

/* Sidebar */
.sidebar {
    width: 260px;
    min-height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, var(--primary), var(--secondary));
    color: #fff;
}

.sidebar a {
    color: rgba(255,255,255,0.9);
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    text-decoration: none;
}

.sidebar a:hover,
.sidebar a.active {
    background: rgba(255,255,255,0.2);
}

/* Main */
.main {
    margin-left: 260px;
    padding: 20px;
}

/* Card */
.form-card {
    background: #fff;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

/* Responsive */
@media(max-width:768px){
    .sidebar{
        position: static;
        width: 100%;
        min-height: auto;
    }
    .main{
        margin-left: 0;
    }
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4 class="text-center mb-4">🏅 Haryana Sports</h4>
    <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="athlete.html" class="active"><i class="bi bi-person-plus"></i> Athlete Registration</a>
    <a href="sports.html"><i class="bi bi-trophy"></i> Sports Events</a>
    <a href="stadium.html"><i class="bi bi-building"></i> Stadiums</a>
    <a href="achivements.html"><i class="bi bi-award"></i> Achievements</a>
    <a href="logout.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <div class="mb-4">
        <h4>Athlete Registration Form</h4>
        <p class="text-muted">Register new athletes under Haryana Sports Department</p>
    </div>

    <div class="form-card">
        <form id="athleteForm">

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Athlete ID</label>
                    <input type="text" class="form-control" id="athleteId" placeholder="ATH1001">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="dob">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Gender</label>
                    <select class="form-select" id="gender">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Sport</label>
                    <select class="form-select" id="sport">
                        <option value="">Select Sport</option>
                        <option>Athletics</option>
                        <option>Wrestling</option>
                        <option>Boxing</option>
                        <option>Kabaddi</option>
                        <option>Hockey</option>
                        <option>Badminton</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Level</label>
                    <select class="form-select" id="level">
                        <option value="">Select Level</option>
                        <option>District</option>
                        <option>State</option>
                        <option>National</option>
                        <option>International</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">District</label>
                    <input type="text" class="form-control" id="district">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" class="form-control" id="contact">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="3" id="address"></textarea>
                </div>
            </div>

            <div class="mt-4 text-end">
                <button type="reset" class="btn btn-secondary">Clear</button>
                <button type="submit" class="btn btn-primary">Register Athlete</button>
            </div>

        </form>

        <div id="msg" class="mt-3"></div>
    </div>
</div>

<!-- JS -->
<script>
document.getElementById("athleteForm").addEventListener("submit", function(e){
    e.preventDefault();

    let fields = [
        "athleteId","name","dob","gender","sport",
        "level","district","contact","email","address"
    ];

    let valid = true;
    fields.forEach(id => {
        if(document.getElementById(id).value.trim() === ""){
            valid = false;
        }
    });

    let msg = document.getElementById("msg");

    if(!valid){
        msg.innerHTML = `<div class="alert alert-danger">
            Please fill all required fields!
        </div>`;
    } else {
        msg.innerHTML = `<div class="alert alert-success">
            Athlete registered successfully!
        </div>`;
        document.getElementById("athleteForm").reset();
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
