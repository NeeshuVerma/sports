<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout | Sports Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.logout-card {
    background: #fff;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 400px;
    width: 100%;
}

.logout-card h4 {
    font-weight: 600;
}

.btn-primary {
    background: #4f46e5;
    border: none;
}
</style>
</head>

<body>

<div class="logout-card">
    <h4 class="mb-3">Logout Successful</h4>
    <p class="text-muted mb-4">
        You have been logged out of the Admin Panel.
    </p>

    <button class="btn btn-primary w-100" onclick="goToLogin()">
        Go to Login Page
    </button>
</div>


<script>
/* Clear login session */
localStorage.removeItem("isLoggedIn");

/* Redirect function */
function goToLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
